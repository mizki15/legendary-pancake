<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover" />
<title>Tilt Gravity Paddle — 傾けて滑らせるブロック</title>
<style>
  html,body { height:100%; margin:0; background:#070707; color:#bfffbf; font-family: system-ui, "Helvetica Neue", Arial; overflow:hidden; }
  #ui { position:fixed; left:8px; top:8px; z-index:30; font-size:13px; color:#bfffbf; background:rgba(0,0,0,0.25); padding:8px; border-radius:6px; }
  #startBtn {
    position:fixed; left:50%; top:50%; transform:translate(-50%,-50%);
    z-index:40; padding:14px 18px; font-size:18px; background:#0b0b0b; color:#bfffbf;
    border:2px solid #2aff7f; border-radius:10px; cursor:pointer;
  }
  #hint { position:fixed; left:10px; bottom:10px; font-size:12px; color:#9aa; z-index:30; }
  canvas { display:block; }
</style>
</head>
<body>

<div id="ui">
  <div id="score">Score: 0</div>
  <div id="gyro">α: 0 β: 0 γ: 0</div>
  <div id="acc">gx,gy: 0, 0</div>
  <div id="params">gravityScale: <span id="gscale">0.9</span> damping: <span id="damp">0.96</span></div>
</div>

<button id="startBtn">センサーを開始（iOS は許可が必要）</button>
<div id="hint">端末を傾けるとブロックがその方向へ滑ります。画面タップでボールをサーブ/リセット。</div>

<!-- three.js r128 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
/*
  Tilt Gravity Paddle Game
  - パドル（ブロック）は「重力ベクトルによる加速度」を受けて滑ります
  - deviceorientation の beta/gamma から重力分力を計算（より直感的で安定）
  - devicemotion の加速度情報が欲しい場合のフォールバックも入れています
*/

let scene, camera, renderer;
let paddle, ball;
const paddleSize = { x: 2.4, y: 1.2, z: 0.4 };
let paddlePos = new THREE.Vector3(0, -2.0, -3.5);
let paddleVel = new THREE.Vector3(0,0,0);
let paddleAcc = new THREE.Vector3(0,0,0);

const ballRadius = 0.24;
let ballPos = new THREE.Vector3(0, 0, 0);
let ballVel = new THREE.Vector3(0, 0, 0);

let lastTime = null;
let score = 0;

const bounds = { x: 4.8, y: 5.5, frontZ: 6.0, backZ: -8.0 };

// 物理パラメータ（調整可）
let gravityScale = 0.9;   // 実効重力（感度）
let damping = 0.96;       // パドルの摩擦（速度の減衰）
let ballDamping = 0.995;

let usingDeviceOrientation = false;
let latestAlpha = 0, latestBeta = 0, latestGamma = 0;

// UI 要素
const uiGyro = document.getElementById('gyro');
const uiAcc = document.getElementById('acc');
const uiScore = document.getElementById('score');
document.getElementById('gscale').innerText = gravityScale.toFixed(2);
document.getElementById('damp').innerText = damping.toFixed(2);

function initThree() {
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
  renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // ライト
  const dir = new THREE.DirectionalLight(0xffffff, 0.95);
  dir.position.set(5, 10, 7);
  scene.add(dir);
  scene.add(new THREE.AmbientLight(0x606060, 0.6));

  // 背景のグリッド（任意）
  const gridMat = new THREE.LineBasicMaterial({color:0x1a1a1a});
  const grid = new THREE.GridHelper(20, 20, 0x222222, 0x111111);
  grid.rotation.x = Math.PI/2;
  // scene.add(grid);

  // パドル（ブロック）
  const paddleGeo = new THREE.BoxGeometry(paddleSize.x, paddleSize.y, paddleSize.z);
  const paddleMat = new THREE.MeshPhongMaterial({color:0x2a9df4, shininess:80});
  paddle = new THREE.Mesh(paddleGeo, paddleMat);
  paddle.position.copy(paddlePos);
  scene.add(paddle);

  // ボール
  const ballGeo = new THREE.SphereGeometry(ballRadius, 24, 18);
  const ballMat = new THREE.MeshPhongMaterial({color:0xffc857, shininess:80});
  ball = new THREE.Mesh(ballGeo, ballMat);
  resetBall();
  scene.add(ball);

  // 床（視覚）
  const floorGeo = new THREE.PlaneGeometry(20, 20, 16, 16);
  const floorMat = new THREE.MeshPhongMaterial({color:0x0b0b0b, side: THREE.DoubleSide});
  const floor = new THREE.Mesh(floorGeo, floorMat);
  floor.rotation.x = Math.PI/2;
  floor.position.z = 0;
  floor.position.y = -3.5;
  // scene.add(floor);

  camera.position.set(0, 0, 10);
  camera.lookAt(0, 0, 0);

  window.addEventListener('resize', onWindowResize);
  requestAnimationFrame(loop);
}

function onWindowResize() {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

// 物理アップデートと描画
function loop(ts) {
  if (!lastTime) lastTime = ts;
  const dt = Math.min((ts - lastTime)/1000, 0.05);
  lastTime = ts;

  // --- パドル：加速度 -> 速度 -> 位置 ---
  // paddleAcc が device のイベントで設定される（下で）
  // ここでは dt を考慮して積分
  // 速度更新（v = v + a * dt）
  paddleVel.addScaledVector(paddleAcc, dt);

  // 摩擦（damping）を時間刻みに適用
  paddleVel.multiplyScalar(Math.pow(damping, dt*60)); // フレームレートに依存しないように補正

  // 位置更新
  paddle.position.addScaledVector(paddleVel, dt * 60); // scale factor to tune feel

  // 境界制限（X,Y）
  paddle.position.x = THREE.MathUtils.clamp(paddle.position.x,
    -bounds.x + paddleSize.x/2, bounds.x - paddleSize.x/2);
  paddle.position.y = THREE.MathUtils.clamp(paddle.position.y,
    -bounds.y + paddleSize.y/2, bounds.y - paddleSize.y/2);

  // パドルの見た目の回転を少し付けて傾きを表現（視覚効果）
  // パドルは端末の傾きに合わせてゆっくり回転
  paddle.rotation.x += ( -latestBeta * Math.PI/180 * 0.25 - paddle.rotation.x) * 0.08;
  paddle.rotation.z += ( -latestGamma * Math.PI/180 * 0.25 - paddle.rotation.z) * 0.08;

  // --- ボール：簡易物理（重力の影響を受ける） ---
  // ボールにも同じ平面内での重力分力を少し与えて転がる感じにする
  // ここでは重力を z 軸方向に使わない（カメラ奥行きを活かすため簡易化）
  // ボール速度に軽い加速度を足す（paddleAcc を逆向きにかけることで、台を傾けた時にボールが転がる）
  const ballGravityEffect = 0.8;
  ballVel.addScaledVector(paddleAcc.clone().multiplyScalar(ballGravityEffect), dt*60);

  // ボール摩擦
  ballVel.multiplyScalar(Math.pow(ballDamping, dt*60));
  ball.position.addScaledVector(ballVel, dt * 60);

  // ボールの壁当たり反射（X,Y）
  if (ball.position.x > bounds.x - ballRadius) {
    ball.position.x = bounds.x - ballRadius;
    ballVel.x *= -0.85;
  } else if (ball.position.x < -bounds.x + ballRadius) {
    ball.position.x = -bounds.x + ballRadius;
    ballVel.x *= -0.85;
  }
  if (ball.position.y > bounds.y - ballRadius) {
    ball.position.y = bounds.y - ballRadius;
    ballVel.y *= -0.85;
  } else if (ball.position.y < -bounds.y + ballRadius) {
    ball.position.y = -bounds.y + ballRadius;
    ballVel.y *= -0.85;
  }

  // z方向：パドルの前後で当たりを判定（球-箱簡易）
  // パドルの面（正面Z）に対する距離で衝突判定
  const normal = new THREE.Vector3(0,0,1).applyQuaternion(paddle.quaternion).normalize();
  const rel = ball.position.clone().sub(paddle.position);
  const distToPlane = rel.dot(normal);
  let collided = false;
  if (Math.abs(distToPlane) <= ballRadius + 0.02) {
    // 近接点がパドルの範囲内かチェック（ローカル座標）
    const inv = new THREE.Matrix4().copy(paddle.matrixWorld).invert();
    const projLocal = ball.position.clone().applyMatrix4(inv);
    const hx = paddleSize.x/2 + 0.02, hy = paddleSize.y/2 + 0.02;
    if (projLocal.x >= -hx && projLocal.x <= hx && projLocal.y >= -hy && projLocal.y <= hy) {
      collided = true;
    }
  }
  if (collided && ball.position.z > paddle.position.z - 0.5) {
    // 反射応答：法線反転 + パドルの速度の影響を加える
    const vDotN = ballVel.dot(normal);
    ballVel.add(normal.clone().multiplyScalar(-(1.6) * vDotN)); // 反発
    ballVel.add(paddleVel.clone().multiplyScalar(0.6)); // パドル速度を伝える
    // スコア
    score++;
    uiScore.innerText = 'Score: ' + score;
    if (navigator.vibrate) navigator.vibrate(12);
  }

  // ball が手前に落ちたらリセット
  if (ball.position.z < paddle.position.z - 3.0) {
    resetBall();
  }

  renderer.render(scene, camera);
  requestAnimationFrame(loop);
}

// サーバー（サーブ）やリセット関係
function resetBall() {
  ball.position.set(0, 1.2, 2.6);
  ballVel.set(0, 0, 0);
}

// ========================
// センサー入力処理
// ========================

// デバイスの角度（beta,gamma）を元に、平面上の重力分力を計算して paddleAcc に設定
function handleOrientationAngles(alpha, beta, gamma) {
  // alpha, beta, gamma は degrees
  latestAlpha = alpha || 0;
  latestBeta = beta || 0;
  latestGamma = gamma || 0;

  uiGyro.innerText = `α:${latestAlpha.toFixed(1)} β:${latestBeta.toFixed(1)} γ:${latestGamma.toFixed(1)}`;

  // beta: front-back tilt (-180..180) (正なら前に倒れる)
  // gamma: left-right tilt (-90..90) (正なら右に倒れる)
  // 重力 9.8 を使って平面上の分力を近似
  const g = 9.8;
  const betaRad = latestBeta * Math.PI/180;
  const gammaRad = latestGamma * Math.PI/180;

  // 平面上の加速度成分（x:左右, y:上下）を計算
  // 実験的に符号・向きを調整（端末向きにより逆になることがあるので必要なら反転）
  const gx = g * Math.sin(gammaRad);      // 右に傾けると正
  const gy = -g * Math.sin(betaRad);      // 前に倒す（beta正）と -y 方向（スクリーン上では下が正）に動かす -> 符号調整

  // 実効加速度（感度調整）
  paddleAcc.x = gx * gravityScale;
  paddleAcc.y = gy * gravityScale;
  // z は使わない

  uiAcc.innerText = `gx,gy: ${paddleAcc.x.toFixed(2)}, ${paddleAcc.y.toFixed(2)}`;
}

// devicemotion fallback: accelerationIncludingGravity をそのまま平面に使う（デバイス依存）
function handleMotionEvent(e) {
  const a = e.accelerationIncludingGravity;
  if (!a) return;
  // a.x: right-positive, a.y: up-positive (device coord), a.z: toward sky-positive (device coord)
  // ここでは a.x を左右、a.y を上下に使う（端末向きにより要調整）
  const gx = a.x || 0;
  const gy = a.y || 0;
  paddleAcc.x = gx * gravityScale * 0.9;
  paddleAcc.y = -gy * gravityScale * 0.9;
  uiAcc.innerText = `accIncl: ${paddleAcc.x.toFixed(2)}, ${paddleAcc.y.toFixed(2)}`;
}

// iOS の許可とイベント登録
async function enableSensors() {
  // iOS 13+ の対応
  try {
    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
      const res = await DeviceOrientationEvent.requestPermission();
      if (res === 'granted') {
        window.addEventListener('deviceorientation', (ev) => {
          usingDeviceOrientation = true;
          handleOrientationAngles(ev.alpha ?? 0, ev.beta ?? 0, ev.gamma ?? 0);
        }, true);
        window.addEventListener('devicemotion', (ev) => {
          handleMotionEvent(ev);
        }, true);
      } else {
        // 許可拒否ならマウスフォールバック
        enableMouseFallback();
      }
    } else {
      // iOS 以外（Android 等）は許可不要なことが多い
      window.addEventListener('deviceorientation', (ev) => {
        usingDeviceOrientation = true;
        handleOrientationAngles(ev.alpha ?? 0, ev.beta ?? 0, ev.gamma ?? 0);
      }, true);
      window.addEventListener('devicemotion', (ev) => {
        handleMotionEvent(ev);
      }, true);
    }
  } catch (err) {
    console.warn('Sensor permission error:', err);
    enableMouseFallback();
  }
}

// マウス / タッチフォールバック（PC や許可拒否時）
function enableMouseFallback() {
  document.addEventListener('mousemove', (ev) => {
    // 画面上の位置を -bounds..bounds にマップしてパドル加速度とする（直接位置でなく加速度寄せにする）
    const nx = (ev.clientX / window.innerWidth) * 2 - 1;
    const ny = -((ev.clientY / window.innerHeight) * 2 - 1);
    const targetX = nx * (bounds.x - paddleSize.x/2);
    const targetY = ny * (bounds.y - paddleSize.y/2);
    // 簡易的に加速度目標を作る
    paddleAcc.x = (targetX - paddle.position.x) * 2.8;
    paddleAcc.y = (targetY - paddle.position.y) * 2.8;
    uiAcc.innerText = `mouse-acc: ${paddleAcc.x.toFixed(2)}, ${paddleAcc.y.toFixed(2)}`;
  });
  document.addEventListener('touchmove', (ev) => {
    if (ev.touches.length === 0) return;
    const t = ev.touches[0];
    const nx = (t.clientX / window.innerWidth) * 2 - 1;
    const ny = -((t.clientY / window.innerHeight) * 2 - 1);
    const targetX = nx * (bounds.x - paddleSize.x/2);
    const targetY = ny * (bounds.y - paddleSize.y/2);
    paddleAcc.x = (targetX - paddle.position.x) * 2.8;
    paddleAcc.y = (targetY - paddle.position.y) * 2.8;
  }, {passive:true});
}

// UI ボタン
document.getElementById('startBtn').addEventListener('click', async () => {
  document.getElementById('startBtn').style.display = 'none';
  initThree();
  await enableSensors();
  enableMouseFallback();
});

// 画面タップでボールを前方にサーブ（またはリセット）
window.addEventListener('touchstart', (ev) => {
  // シンプルにサーブ
  ball.position.set(paddle.position.x, paddle.position.y + 1.2, paddle.position.z + 4.0);
  ballVel.set((Math.random()-0.5)*1.2, (Math.random()-0.3)*1.0, -1.5 - Math.random()*3.0);
}, {passive:true});
window.addEventListener('mousedown', () => {
  ball.position.set(paddle.position.x, paddle.position.y + 1.2, paddle.position.z + 4.0);
  ballVel.set((Math.random()-0.5)*1.2, (Math.random()-0.3)*1.0, -1.5 - Math.random()*3.0);
});

// キーボードでパラメータ調整（デバッグ用）
window.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowUp') { gravityScale = Math.min(2.5, gravityScale + 0.05); document.getElementById('gscale').innerText = gravityScale.toFixed(2); }
  if (e.key === 'ArrowDown') { gravityScale = Math.max(0.05, gravityScale - 0.05); document.getElementById('gscale').innerText = gravityScale.toFixed(2); }
  if (e.key === 'ArrowRight') { damping = Math.min(0.999, damping + 0.005); document.getElementById('damp').innerText = damping.toFixed(2); }
  if (e.key === 'ArrowLeft') { damping = Math.max(0.85, damping - 0.005); document.getElementById('damp').innerText = damping.toFixed(2); }
});

// 初期化クリックがなされていない場合でも UI は見えるようにしておく
uiGyro.innerText = 'α: 0 β: 0 γ: 0';
uiAcc.innerText = 'gx,gy: 0, 0';
uiScore.innerText = 'Score: ' + score;

</script>
</body>
</html>
