<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <title>業務効率化ツール2 (フライト)</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/work_optimization_style2.css', q='20250705120') }}">
</head>
<body>
    <h1>業務効率化ツール2 (フライト)</h1>

    <form action="{{ url_for('work_optimize2.convert') }}" method="post">
        <div class="main-grid">
            <div class="left-half">
                <label>便番号 (改行区切りで複数入力)</label>
                <textarea class ="lefttext" name="flight_number" rows="18" required placeholder="例: NH123&#13;NH456"></textarea>

                <label style="margin-top:1em; display:block;">路線</label>
                <div class="route-horizontal">
                    <label><input type="radio" name="routes" value="往路" required> 往路</label>
                    <label><input type="radio" name="routes" value="復路"> 復路</label>
                </div>
            </div>

            <div class="right-half">
                <div class="flight-period-box">
                    <label>販売期間</label>
                    <div class="flight-period-inline">
                        <input type="text" name="sale_from" placeholder="YYYY/MM/DD" required>
                        <span>～</span>
                        <input type="text" name="sale_to" placeholder="YYYY/MM/DD" required>
                    </div>
                </div>

                <div class="flight-period-box">
                    <label>搭乗期間</label>
                    <div class="flight-period-inline">
                        <input type="text" name="flight_from" placeholder="YYYY/MM/DD" required>
                        <span>～</span>
                        <input type="text" name="flight_to" placeholder="YYYY/MM/DD" required>
                    </div>
                </div>

                <label>発空港コード</label>
                <input type="text" name="airport" placeholder="HND" required>

                <label>日数</label>
                <input class="day-input" type="number" name="day" min="1" value="1" required>

                <label>参加者合計人数</label>
                <div class="radio-group-horizontal">
                    <label><input type="radio" name="participants" value="1" required> 一人</label>
                    <label><input type="radio" name="participants" value="2"> 二人以上</label>
                    <label><input type="radio" name="participants" value="全て"> 全て</label>
                </div>
            </div>
        </div>

        <div class="submit-container">
            <label>利益率設定 (全適用チェック時は日曜日の値を使用)</label>
            <table class="day-table" style="width:100%; border-collapse: collapse; margin-top:10px;">
                <thead>
                    <tr style="background:#f2f2f2;">
                        <th>年齢層</th><th>全適用</th><th>日</th><th>月</th><th>火</th><th>水</th><th>木</th><th>金</th><th>土</th>
                    </tr>
                </thead>
                <tbody>
                    {% for type_en, type_ja in [('adult','大人'), ('child','子供'), ('infant','幼児')] %}
                    <tr>
                        <td style="padding:5px;">{{ type_ja }}</td>
                        <td><input type="checkbox" name="profit_{{ type_en }}_allweek" value="1"></td>
                        {% for i in range(7) %}
                        <td><input type="number" name="profit_{{ type_en }}[]" value="0" style="width:3.5em;"></td>
                        {% endfor %}
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
            <button type="submit" style="margin-top:30px; padding: 10px 40px; font-weight: bold; cursor: pointer;">CSVに変換してダウンロード</button>
        </div>
    </form>
</body>
</html>
