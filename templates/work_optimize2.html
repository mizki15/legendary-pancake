<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <title>業務効率化ツール2 (フライト)</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/work_optimization_style2.css', q='20250705120') }}">
</head>
<body>
    <h1>業務効率化ツール2 (フライト)</h1>

    <form id="convertForm" method="post">
        <div class="main-grid">
            <div class="left-half">
                <label>便番号 (改行区切り)</label>
                <textarea class ="lefttext" name="flight_number" rows="18" required></textarea>

                <label style="margin-top:1em; display:block;">路線</label>
                <div class="route-horizontal">
                    <label><input type="radio" name="routes" value="往路" required> 往路</label>
                    <label><input type="radio" name="routes" value="復路"> 復路</label>
                </div>
            </div>

            <div class="right-half">
                <div class="flight-period-box">
                    <label>販売期間 / 搭乗期間</label>
                    <input type="text" name="sale_from" placeholder="販売From" required>
                    <input type="text" name="sale_to" placeholder="販売To" required>
                    <input type="text" name="flight_from" placeholder="搭乗From" required>
                    <input type="text" name="flight_to" placeholder="搭乗To" required>
                </div>
                <label>発空港</label><input type="text" name="airport" required>
                <label>日数</label><input type="number" name="day" value="1" required>
                <label>参加者</label>
                <select name="participants">
                    <option value="1">1人</option>
                    <option value="2">2人以上</option>
                    <option value="全て">全て</option>
                </select>
            </div>
        </div>

        <div class="submit-container">
            <table class="day-table">
                {% for type in ['adult', 'child', 'infant'] %}
                <tr>
                    <td>{{ type }}</td>
                    <td><input type="checkbox" name="profit_{{ type }}_allweek" value="1"></td>
                    {% for i in range(7) %}
                    <td><input type="number" name="profit_{{ type }}[]" value="0" style="width:3em;"></td>
                    {% endfor %}
                </tr>
                {% endfor %}
            </table>
            <button type="submit" id="submitBtn" style="margin-top:20px; padding:10px 30px;">CSVに変換 (ブラウザコンソールを確認)</button>
        </div>
    </form>

    <script>
    document.getElementById('convertForm').addEventListener('submit', async function(e) {
        e.preventDefault(); // 通常の送信を止める
        
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = "処理中...";

        console.log("--- [Browser Console] 処理開始 ---");

        // 1. フォームデータの取得
        const formData = new FormData(this);
        console.log("送信データ内容:");
        for (let [key, value] of formData.entries()) {
            console.log(`  ${key}: ${value}`);
        }

        try {
            // 2. サーバーへ送信
            console.log("サーバーにリクエストを送信中...");
            const response = await fetch("{{ url_for('work_optimize2.convert') }}", {
                method: "POST",
                body: formData
            });

            console.log(`HTTPステータス: ${response.status} ${response.statusText}`);

            if (!response.ok) throw new Error("サーバーエラーが発生しました");

            // 3. Blobとしてデータを受け取る
            const blob = await response.blob();
            console.log(`受信データサイズ: ${blob.size} バイト`);

            if (blob.size === 0) {
                console.error("警告: 受信したデータが0バイトです！サーバー側の生成処理に問題があります。");
                alert("エラー: 0バイトのファイルが生成されました。");
            } else {
                // 4. ダウンロード処理
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = "converted.csv";
                document.body.appendChild(a);
                a.click();
                a.remove();
                window.URL.revokeObjectURL(url);
                console.log("ダウンロードを開始しました。");
            }

        } catch (error) {
            console.error("エラー詳細:", error);
            alert("通信エラーが発生しました。コンソールを確認してください。");
        } finally {
            btn.disabled = false;
            btn.innerText = "CSVに変換 (ブラウザコンソールを確認)";
            console.log("--- [Browser Console] 処理終了 ---");
        }
    });
    </script>
</body>
</html>
