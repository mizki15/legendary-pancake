<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UT Eitan Quiz - 英単語穴埋めクイズ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 単語バッジがホバー時にふわっと浮き上がるアニメーション */
        .word-badge {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .word-badge:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col font-sans text-slate-800 antialiased">

    <header class="bg-indigo-600 text-white shadow-md">
        <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <i class="fa-solid fa-graduation-cap text-yellow-300"></i>
                <span class="tracking-wide">UT Eitan Quiz</span>
            </h1>
            <a href="/" class="text-xs bg-indigo-700 hover:bg-indigo-800 text-white font-semibold px-3 py-2 rounded-lg transition duration-200 flex items-center gap-1.5">
                <i class="fa-solid fa-house"></i> トップに戻る
            </a>
        </div>
    </header>

    <main class="flex-grow max-w-4xl w-full mx-auto px-4 py-8">
        
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 md:p-8 mb-6">
            
            <div class="flex flex-wrap justify-between items-center gap-4 mb-6">
                <div class="flex items-center gap-2">
                    <span class="bg-indigo-50 text-indigo-700 font-bold px-3 py-1 rounded-lg text-xs tracking-wider border border-indigo-100">
                        Chapter {{ chapter }}
                    </span>
                    <span class="bg-emerald-50 text-emerald-700 font-bold px-3 py-1 rounded-lg text-xs tracking-wider border border-emerald-100">
                        Section {{ number }}
                    </span>
                </div>
                <span class="text-sm font-semibold text-slate-400">
                    問題番号: {{ question_number }}
                </span>
            </div>

            <div class="mb-8">
                <div class="flex items-center gap-2 mb-3">
                    <i class="fa-solid fa-lightbulb text-amber-500 text-sm"></i>
                    <h3 class="text-xs font-bold text-slate-500 uppercase tracking-wider">活用前の単語（ヒント候補）</h3>
                </div>
                <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 flex flex-wrap gap-2.5">
                    {% for hint in hints %}
                    <span class="word-badge bg-white border border-slate-300 text-slate-700 px-4 py-2 rounded-xl font-mono font-semibold shadow-sm text-sm hover:border-indigo-500 hover:text-indigo-600 cursor-default select-none">
                        {{ hint }}
                    </span>
                    {% endfor %}
                </div>
            </div>

            <div class="mb-8">
                <div class="flex items-center gap-2 mb-3">
                    <i class="fa-solid fa-quote-left text-indigo-500 text-sm"></i>
                    <h3 class="text-xs font-bold text-slate-500 uppercase tracking-wider">問題英文</h3>
                </div>
                <div class="bg-slate-900 text-slate-100 p-6 rounded-2xl font-mono text-base md:text-lg leading-relaxed shadow-inner" id="sentence-container">
                    </div>
            </div>

            <hr class="border-slate-150 my-6">

            <div>
                <form id="quiz-form" onsubmit="submitAnswer(event)" class="space-y-4">
                    <div id="inputs-container" class="space-y-3">
                        </div>

                    <div class="flex flex-col sm:flex-row gap-3 pt-4">
                        <button type="submit" id="submit-btn" class="flex-grow bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3.5 px-6 rounded-xl shadow-lg shadow-indigo-100 hover:shadow-indigo-200 transition duration-200 flex justify-center items-center gap-2 text-sm md:text-base">
                            <i class="fa-solid fa-circle-check"></i> 答え合わせをする
                        </button>
                        <button type="button" onclick="loadNextQuestion()" class="bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold py-3.5 px-6 rounded-xl transition duration-200 flex justify-center items-center gap-2 text-sm md:text-base">
                            次の問題に進む <i class="fa-solid fa-arrow-right"></i>
                        </button>
                    </div>
                </form>
            </div>

            <div id="result-alert" class="mt-6 p-5 rounded-xl border-2 hidden flex items-start gap-4">
                <div class="text-3xl mt-0.5" id="result-icon"></div>
                <div class="flex-grow">
                    <h4 class="font-bold text-base md:text-lg" id="result-title"></h4>
                    <div class="text-sm mt-2 leading-relaxed" id="result-desc"></div>
                </div>
            </div>

        </div>

        <div class="flex flex-col sm:flex-row justify-between items-center gap-3 text-sm text-slate-500 px-2">
            <div>
                全 {{ total_questions }} 問中 <span class="font-bold text-slate-800">{{ current_idx + 1 }}</span> 問目
            </div>
            <button onclick="loadRandomQuestion()" class="text-indigo-600 hover:text-indigo-700 font-semibold flex items-center gap-1.5 transition">
                <i class="fa-solid fa-shuffle"></i> ランダムに出題する
            </button>
        </div>

    </main>

    <footer class="bg-slate-100 border-t border-slate-200 py-6 text-center text-xs text-slate-400">
        <p>&copy; 2026 UT Eitan Quiz App. Powered by Flask & Tailwind CSS</p>
    </footer>

    <script>
        // Flaskから安全にデータを引き継ぎ
        const sentenceTemplate = {{ sentence_template|tojson }};
        const targetsCount = {{ targets_count }};
        const currentIdx = {{ current_idx }};
        const totalQuestions = {{ total_questions }};

        // 読み込み完了時に実行
        document.addEventListener('DOMContentLoaded', () => {
            renderSentenceAndInputs();
        });

        // 英文内の特殊文字列を入力用バッジに変え、解答フォームを生成する
        function renderSentenceAndInputs() {
            const sentenceContainer = document.getElementById('sentence-container');
            const inputsContainer = document.getElementById('inputs-container');
            
            let htmlSentence = sentenceTemplate;
            let inputsHtml = '';

            for (let i = 0; i < targetsCount; i++) {
                // 英文内の "__INPUT_0__" などを視覚的な空欄インジケータに置き換え
                const placeholderHtml = `<span class="inline-block bg-indigo-500/20 text-indigo-300 border-b-2 border-indigo-400 px-2.5 py-0.5 rounded mx-1 font-bold text-sm">空欄 [${i + 1}]</span>`;
                htmlSentence = htmlSentence.replace(`__INPUT_${i}__`, placeholderHtml);

                // 下部に表示するインプット要素の組み立て
                inputsHtml += `
                    <div class="flex flex-col sm:flex-row sm:items-center gap-2 sm:gap-3 bg-white p-3 rounded-lg border border-slate-200 shadow-sm">
                        <label for="answer-input-${i}" class="flex-shrink-0 bg-indigo-100 text-indigo-800 font-bold w-7 h-7 rounded-full flex items-center justify-center text-xs">
                            ${i + 1}
                        </label>
                        <input type="text" id="answer-input-${i}" 
                               class="answer-field flex-grow bg-slate-50 border border-slate-200 rounded-lg px-3.5 py-2.5 focus:bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 outline-none transition font-mono font-medium text-slate-800"
                               placeholder="空欄 [${i + 1}] の解答を入力してください" 
                               autocomplete="off"
                               onkeydown="handleKeyNavigation(event, ${i})">
                    </div>
                `;
            }

            sentenceContainer.innerHTML = htmlSentence;
            inputsContainer.innerHTML = inputsHtml;

            // 最初の解答欄にフォーカスを当てる
            const firstInput = document.getElementById('answer-input-0');
            if (firstInput) firstInput.focus();
        }

        // 複数穴がある場合、Enterキーでスムーズに次の入力欄へ移るためのナビゲーション
        function handleKeyNavigation(event, currentIndex) {
            if (event.key === 'Enter') {
                if (currentIndex < targetsCount - 1) {
                    event.preventDefault(); // フォーム送信を防ぐ
                    const nextInput = document.getElementById(`answer-input-${currentIndex + 1}`);
                    if (nextInput) nextInput.focus();
                }
            }
        }

        // 答え合わせ（非同期通信）
        async function submitAnswer(event) {
            event.preventDefault();

            const answers = [];
            for (let i = 0; i < targetsCount; i++) {
                const val = document.getElementById(`answer-input-${i}`).value;
                answers.push(val);
            }

            try {
                const response = await fetch('/ut-eitan-quiz/check', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ answers: answers })
                });

                if (!response.ok) throw new Error('判定処理でサーバーエラーが発生しました。');

                const data = await response.json();
                displayResult(data);

            } catch (error) {
                console.error(error);
                alert('通信に失敗しました。ファイルパスやサーバーの状態を確認してください。');
            }
        }

        // 判定結果の描画
        function displayResult(data) {
            const alertBox = document.getElementById('result-alert');
            const iconBox = document.getElementById('result-icon');
            const titleBox = document.getElementById('result-title');
            const descBox = document.getElementById('result-desc');

            alertBox.className = "mt-6 p-5 rounded-xl border-2 hidden flex items-start gap-4";

            if (data.is_all_correct) {
                // 全問正解時のUI
                alertBox.classList.add('bg-emerald-50', 'border-emerald-300', 'text-emerald-900');
                iconBox.innerHTML = '<i class="fa-solid fa-circle-check text-emerald-500"></i>';
                titleBox.textContent = 'Excellent! すべて正解です！';
                descBox.innerHTML = '完璧です！すべての空欄に正しい単語が入力されました。';
                
                for (let i = 0; i < targetsCount; i++) {
                    document.getElementById(`answer-input-${i}`).className = "answer-field flex-grow bg-emerald-50 border border-emerald-300 rounded-lg px-3.5 py-2.5 outline-none font-mono font-medium text-emerald-800";
                }
            } else {
                // 不正解が含まれる場合のUI
                alertBox.classList.add('bg-rose-50', 'border-rose-300', 'text-rose-900');
                iconBox.innerHTML = '<i class="fa-solid fa-circle-xmark text-rose-500"></i>';
                titleBox.textContent = '不正解が含まれています。確認しましょう：';
                
                let detailsHtml = '<div class="space-y-2 mt-2">';
                data.results.forEach((res, idx) => {
                    const input = document.getElementById(`answer-input-${idx}`);
                    if (res.is_correct) {
                        input.className = "answer-field flex-grow bg-emerald-50 border border-emerald-300 rounded-lg px-3.5 py-2.5 outline-none font-mono font-medium text-emerald-800";
                        detailsHtml += `
                            <div class="flex items-center gap-2 font-mono">
                                <span class="text-emerald-600 font-bold">✓ 空欄 [${idx + 1}]:</span>
                                <span class="bg-emerald-100 text-emerald-800 px-2 py-0.5 rounded font-bold">${res.correct_answer}</span>
                            </div>
                        `;
                    } else {
                        input.className = "answer-field flex-grow bg-rose-50 border border-rose-300 rounded-lg px-3.5 py-2.5 outline-none font-mono font-medium text-rose-800";
                        detailsHtml += `
                            <div class="flex flex-wrap items-center gap-2 font-mono">
                                <span class="text-rose-600 font-bold">✗ 空欄 [${idx + 1}]:</span>
                                <span>正解は:</span>
                                <span class="bg-indigo-100 text-indigo-950 px-2 py-0.5 rounded font-bold">${res.correct_answer}</span>
                                <span class="text-slate-400 text-xs">(入力: <span class="line-through">${res.user_answer || "未入力"}</span>)</span>
                            </div>
                        `;
                    }
                });
                detailsHtml += '</div>';
                descBox.innerHTML = detailsHtml;
            }

            alertBox.classList.remove('hidden');
            alertBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        // 次の問題に進む
        function loadNextQuestion() {
            let nextIdx = currentIdx + 1;
            if (nextIdx >= totalQuestions) nextIdx = 0; // 最後まで行ったら最初に戻る
            window.location.href = `/ut-eitan-quiz/?q=${nextIdx}`;
        }

        // ランダム出題
        function loadRandomQuestion() {
            window.location.href = `/ut-eitan-quiz/`;
        }
    </script>
</body>
</html>
